<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Furniture Monitor</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            text-align: center;
        }
        .login-card h1 {
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #6366f1, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="login-card glass-card">
        <h1>Вход в систему</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Доступ к мониторингу цен конкурентов</p>
        
        <form id="loginForm">
            <div class="form-group" style="text-align: left;">
                <label>Пароль администратора</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required style="width: 100%; padding: 0.8rem; box-sizing: border-box;">
            </div>
            <button type="submit" style="width: 100%; margin-top: 1rem; padding: 1rem; background: linear-gradient(to right, var(--primary), var(--accent)); font-weight: 800;">
                Войти в панель
            </button>
        </form>
        <div id="loginMsg" style="margin-top: 1rem; font-size: 0.9rem; color: #ef4444;"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const msgEl = document.getElementById('loginMsg');
            
            try {
                const formData = new FormData();
                formData.append('password', password);
                
                const response = await fetch('/api/login', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (response.ok) {
                    window.location.href = '/';
                } else {
                    msgEl.innerText = data.message || 'Ошибка входа: неверный пароль';
                }
            } catch (err) {
                console.error(err);
                msgEl.innerText = 'Не удалось связаться с сервером';
            }
        });
    </script>
</body>
</html>
