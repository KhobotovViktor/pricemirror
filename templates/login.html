<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Price Mirror</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-icon">
            <i class="fa-solid fa-magnifying-glass-chart"></i>
        </div>
        <h1 class="auth-title">Price Mirror</h1>
        <p class="auth-subtitle">Вход в систему управления</p>
        
        <form id="loginForm">
            <div class="form-group" style="text-align:left">
                <label class="form-label text-muted uppercase text-xs">Логин</label>
                <div class="form-input-icon">
                    <i class="fa-solid fa-user"></i>
                    <input class="form-input" type="text" id="username" name="username" placeholder="Логин" required autocomplete="username">
                </div>
            </div>

            <div class="form-group" style="text-align:left">
                <label class="form-label text-muted uppercase text-xs">Пароль доступа</label>
                <div class="form-input-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input class="form-input" type="password" id="password" name="password" placeholder="Пароль" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-full" style="margin-top:8px">
                Авторизоваться
            </button>
        </form>

        <div id="loginMsg" aria-live="polite"></div>
        
        <div class="auth-footer">
            &copy; 2026 Price Mirror. Доступ только для сотрудников компании.
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const msgEl = document.getElementById('loginMsg');
            
            try {
                const formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);
                
                const response = await fetch('/api/login', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (response.ok) {
                    window.location.href = '/';
                } else if (response.status === 429) {
                    msgEl.innerText = data.message || 'Слишком много попыток. Подождите 5 минут.';
                } else {
                    msgEl.innerText = data.message || 'Неверный пароль доступа';
                }
            } catch (err) {
                console.error(err);
                msgEl.innerText = 'Сбой подключения к серверу';
            }
        });
    </script>
</body>
</html>
